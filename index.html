<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>調剤用・余り計算機</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    body { font-family: sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 25px; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); width: 280px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
    button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; }
    .res { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; text-align: center; font-size: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="text-align:center; margin-top:0;">余り計算機</h2>
    <input type="number" id="a" placeholder="割られる数 (全量など)" inputmode="numeric">
    <input type="number" id="b" placeholder="割る数 (ヒート枚数など)" inputmode="numeric">
    <button onclick="calc()">計算</button>
    <div id="out" class="res">数字を入力してください</div>
  </div>
  <script>
    function calc() {
      const a = parseInt(document.getElementById('a').value);
      const b = parseInt(document.getElementById('b').value);
      const out = document.getElementById('out');
      if (isNaN(a) || isNaN(b) || b === 0) { out.innerText = "正しく入力してください"; return; }
      out.innerHTML = `商: <strong>${Math.floor(a/b)}</strong><br>余り: <strong style="color:red;">${a%b}</strong>`;
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
